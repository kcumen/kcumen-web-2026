name = "kcumen-web-2026"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]
main = ".open-next/worker.js"

routes = [
  { pattern = "kcumen.co", zone_name = "kcumen.co", custom_domain = true }
]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

[vars]
EMAIL_FROM = "contacto@kcumen.co"
EMAIL_TO = "hola@kcumen.co"
# Turnstile site key (public — safe to commit)
NEXT_PUBLIC_TURNSTILE_SITE_KEY = "0x4AAAAAACs6a5amW1Kz9Ze-"
# TURNSTILE_SECRET_KEY must be set as a Worker secret (not here):
# npx wrangler secret put TURNSTILE_SECRET_KEY
